version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: taskmanager:prod
    container_name: taskmanager_app
    restart: unless-stopped
    env_file:
      - ../env/.env.prod
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  default:
    name: taskmanager_network
