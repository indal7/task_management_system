version: '3.8'

# Development docker-compose – builds locally, mounts source for live reload.
# Usage: docker compose -f docker/docker-compose.dev.yml up

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: taskmanager_app_dev
    command: python app.py
    environment:
      - FLASK_ENV=development
      - FLASK_HOST=0.0.0.0
      - FLASK_PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    env_file:
      - ./env/.env.dev
    volumes:
      - ..:/app          # Live-reload: source changes reflected immediately
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - taskmanager_network_dev

  redis:
    image: redis:7-alpine
    container_name: taskmanager_redis_dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data_dev:/data
    command: redis-server --appendonly yes
    networks:
      - taskmanager_network_dev
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  redis_data_dev:

networks:
  taskmanager_network_dev:
    driver: bridge
