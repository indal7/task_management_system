name: Dev Deploy

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    name: Build & Push to ECR (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Generate image metadata (tags & labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: "492661377251.dkr.ecr.ap-south-1.amazonaws.com/${{ secrets.ECR_REPOSITORY_DEV || 'taskmanager-dev' }}"
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=dev-latest

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image to ECR (dev)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=prod
          cache-to: type=gha,mode=max,scope=prod

  # ── Deploy to DEV EC2 ───────────────────��─────────────────────────────────
  deploy:
    name: Deploy to DEV EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

      - name: Compute ECR Image URI
        id: ecr-image
        run: |
          # Hardcode the values since job outputs aren't working
          AWS_ACCOUNT_ID="492661377251"
          AWS_REGION="${{ secrets.AWS_REGION || 'ap-south-1' }}"
          ECR_REPOSITORY="${{ secrets.ECR_REPOSITORY_DEV || 'taskmanager-dev' }}"
          IMAGE_TAG="dev-latest"
          
          ECR_REGISTRY="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com"
          ECR_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"
          
          echo "ecr_image=$ECR_IMAGE" >> $GITHUB_OUTPUT
          echo "ecr_registry=$ECR_REGISTRY" >> $GITHUB_OUTPUT
          
          echo "✅ ECR Registry: $ECR_REGISTRY"
          echo "✅ ECR Image: $ECR_IMAGE"

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_KEY_DEV }}" > ~/.ssh/github-actions-key.pem
          chmod 600 ~/.ssh/github-actions-key.pem
          ssh-keyscan -H "${{ secrets.EC2_HOST_DEV }}" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/github-actions-key.pem \
              -o ConnectTimeout=30 \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.EC2_HOST_DEV }} \
              "echo '✅ SSH connection successful'"

      - name: Copy docker-compose file to DEV EC2
        run: |
          ssh -i ~/.ssh/github-actions-key.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.EC2_HOST_DEV }} \
              "mkdir -p /home/ubuntu/taskmanager/env"
          scp -i ~/.ssh/github-actions-key.pem \
              -o StrictHostKeyChecking=no \
              docker/docker-compose.prod.yml \
              ubuntu@${{ secrets.EC2_HOST_DEV }}:/home/ubuntu/taskmanager/docker-compose.prod.yml
          echo "✅ docker-compose.prod.yml copied to DEV EC2"

      - name: Pull latest image and restart on DEV EC2
        env:
          ECR_IMAGE: ${{ steps.ecr-image.outputs.ecr_image }}
          ECR_REGISTRY: ${{ steps.ecr-image.outputs.ecr_registry }}
          AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          echo "🔐 ECR_IMAGE: $ECR_IMAGE"
          echo "🔐 ECR_REGISTRY: $ECR_REGISTRY"
          
          # Create a temporary deployment script
          cat > /tmp/ecr_deploy.sh << 'SCRIPT'
          #!/bin/bash
          set -e
          
          ECR_IMAGE="$1"
          AWS_REGION="$2"
          AWS_ACCESS_KEY_ID="$3"
          AWS_SECRET_ACCESS_KEY="$4"
          
          echo "🔐 Authenticating Docker with ECR..."
          echo "ECR_IMAGE: $ECR_IMAGE"
          echo "AWS_REGION: $AWS_REGION"
          
          # Export AWS credentials
          export AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY"
          export AWS_REGION="$AWS_REGION"
          
          # Get login password and authenticate
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$(echo $ECR_IMAGE | cut -d'/' -f1)"
          
          echo "📥 Pulling image: $ECR_IMAGE"
          docker pull "$ECR_IMAGE"

          ENV_FILE="/home/ubuntu/taskmanager/env/.env.prod"
          if [ ! -f "$ENV_FILE" ]; then
            echo "❌ Missing env file at $ENV_FILE"
            echo "Create this file before deployment (or update compose/workflow path)."
            exit 1
          fi

          echo "🧪 Validating compose configuration"
          cd /home/ubuntu/taskmanager
          ECR_IMAGE="$ECR_IMAGE" RUN_DB_MIGRATIONS_ON_START=0 docker compose -f docker-compose.prod.yml config > /dev/null

          echo "🗃️ Running database migrations as a controlled release step"
          docker run --rm --network host \
            --env-file "$ENV_FILE" \
            -w /app \
            --entrypoint flask \
            "$ECR_IMAGE" db upgrade
          
          echo "🚀 Restarting application..."
          ECR_IMAGE="$ECR_IMAGE" RUN_DB_MIGRATIONS_ON_START=0 \
            docker compose -f docker-compose.prod.yml up -d --remove-orphans
          
          sleep 15
          docker ps
          SCRIPT
          
          chmod +x /tmp/ecr_deploy.sh
          
          # Copy script to EC2
          scp -i ~/.ssh/github-actions-key.pem \
              -o StrictHostKeyChecking=no \
              /tmp/ecr_deploy.sh \
              ubuntu@${{ secrets.EC2_HOST_DEV }}:/tmp/ecr_deploy.sh
          
          # Execute on EC2 with credentials
          ssh -i ~/.ssh/github-actions-key.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.EC2_HOST_DEV }} \
              bash /tmp/ecr_deploy.sh "$ECR_IMAGE" "$AWS_REGION" "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY"

      - name: Verify DEV Deployment
        run: |
          ssh -i ~/.ssh/github-actions-key.pem \
              -o StrictHostKeyChecking=no \
              ubuntu@${{ secrets.EC2_HOST_DEV }} << 'EOF'
            if docker ps | grep -q "taskmanager_app"; then
              echo "✅ Flask container is running"
              docker logs taskmanager_app --tail=20
              sleep 5
              if curl -f --max-time 10 http://localhost:5000/health > /dev/null 2>&1; then
                echo "✅ Health check passed"
              else
                echo "⚠️  Health check not responding yet – review logs above"
              fi
            else
              echo "❌ Deployment failed – container not running"
              docker ps -a
              docker logs taskmanager_app --tail=50 || true
              exit 1
            fi
          EOF

      - name: Notify DEV Deployment Success
        run: |
          echo "🎉 DEV DEPLOYMENT SUCCESSFUL!"
          echo "App:      http://${{ secrets.EC2_HOST_DEV }}:5000"
          echo "Health:   http://${{ secrets.EC2_HOST_DEV }}:5000/health"
          echo "Deployed: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "Actor:    ${{ github.actor }}"