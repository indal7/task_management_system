name: Dev Deploy

# Triggers automatically on every push to the develop branch.
# No manual approval needed – fast iteration loop for development.
#
# Required GitHub Secrets (Settings → Secrets and variables → Actions):
#   AWS_ACCESS_KEY_ID       – IAM user access key with ECR + describe-instances perms
#   AWS_SECRET_ACCESS_KEY   – Matching secret key
#   AWS_REGION              – e.g. ap-south-1  (defaults to ap-south-1 if omitted)
#   EC2_HOST_DEV            – Public IP / hostname of the dev EC2 instance
#   EC2_KEY_DEV             – Private SSH key to reach the dev EC2 instance

on:
  push:
    branches: [ develop ]

jobs:
  # ── Build & Push Docker image to ECR (dev) ──────────────────────────────────
  build-and-push:
    name: Build & Push to ECR (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Generate image tag
      id: image_tag
      run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

    - name: Build, tag, and push image to ECR (dev)
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: taskmanager-dev
        IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
      run: |
        ECR_URI="$ECR_REGISTRY/$ECR_REPOSITORY"
        docker build -f docker/Dockerfile \
          -t "$ECR_URI:$IMAGE_TAG" \
          -t "$ECR_URI:latest" \
          .
        docker push "$ECR_URI:$IMAGE_TAG"
        docker push "$ECR_URI:latest"
        echo "✅ Pushed $ECR_URI:$IMAGE_TAG"

  # ── Deploy to DEV EC2 ───────────────────────────────────────────────────────
  deploy:
    name: Deploy to DEV EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Add SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY_DEV }}" > ~/.ssh/github-actions-key.pem
        chmod 600 ~/.ssh/github-actions-key.pem
        ssh-keyscan -H ${{ secrets.EC2_HOST_DEV }} >> ~/.ssh/known_hosts 2>/dev/null || true
        ssh -i ~/.ssh/github-actions-key.pem \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST_DEV }} \
            "echo '✅ SSH connection successful - $(date)'"

    - name: Copy docker-compose file to DEV EC2
      run: |
        ssh -i ~/.ssh/github-actions-key.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST_DEV }} \
            "sudo mkdir -p /home/ubuntu/taskmanager && sudo chown -R ubuntu:ubuntu /home/ubuntu/taskmanager"
        scp -i ~/.ssh/github-actions-key.pem \
            -o StrictHostKeyChecking=no \
            docker/docker-compose.dev.yml \
            ubuntu@${{ secrets.EC2_HOST_DEV }}:/home/ubuntu/taskmanager/docker-compose.dev.yml
        echo "✅ docker-compose.dev.yml copied to DEV EC2"

    - name: Pull latest image and restart containers on DEV EC2
      env:
        IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
        ECR_REPOSITORY: taskmanager-dev
      run: |
        ssh -T -i ~/.ssh/github-actions-key.pem ubuntu@${{ secrets.EC2_HOST_DEV }} << ENDSSH
          set -e
          ACCOUNT_ID=\$(aws sts get-caller-identity --query Account --output text)
          ECR_REGISTRY="\$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          ECR_URI="\$ECR_REGISTRY/$ECR_REPOSITORY"

          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin "\$ECR_REGISTRY"

          docker pull "\$ECR_URI:latest"
          mkdir -p /home/ubuntu/taskmanager/env
          export ECR_IMAGE="\$ECR_URI"
          docker compose -f /home/ubuntu/taskmanager/docker-compose.dev.yml \
            up -d --remove-orphans
          sleep 15
          docker ps
        ENDSSH

    - name: Verify DEV Deployment
      run: |
        ssh -i ~/.ssh/github-actions-key.pem ubuntu@${{ secrets.EC2_HOST_DEV }} << 'EOF'
          if docker ps | grep -q "taskmanager_app"; then
            echo "✅ Flask container is running on DEV"
            docker logs taskmanager_app --tail=20
            sleep 5
            if curl -f --max-time 10 http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ App is responding on port 5000"
            else
              echo "⚠️  App may not be responding yet – check logs above"
            fi
          else
            echo "❌ Deployment failed – container not running"
            docker ps -a
            docker logs taskmanager_app --tail=50 || true
            exit 1
          fi
        EOF

    - name: Notify DEV Deployment Success
      run: |
        echo "🚀 DEV deployment successful!"
        echo "App:    http://${{ secrets.EC2_HOST_DEV }}:5000"
        echo "Health: http://${{ secrets.EC2_HOST_DEV }}:5000/health"
        echo "Image tag: ${{ needs.build-and-push.outputs.image_tag }}"
