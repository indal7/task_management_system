name: Dev Deploy

on:
  push:
    branches: [ master ]

jobs:
  build-and-push:
    name: Build & Push to ECR (dev)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Generate image tag
      id: image_tag
      run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

    - name: Build, tag, and push image to ECR (dev)
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: taskmanager-dev
        IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
      run: |
        ECR_URI="$ECR_REGISTRY/$ECR_REPOSITORY"
        docker build -f docker/Dockerfile.dev \
          -t "$ECR_URI:$IMAGE_TAG" \
          -t "$ECR_URI:latest" \
          .
        docker push "$ECR_URI:$IMAGE_TAG"
        docker push "$ECR_URI:latest"
        echo "✅ Pushed $ECR_URI:$IMAGE_TAG"

  deploy:
    name: Deploy to DEV EC2
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Add SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY_DEV }}" > ~/.ssh/github-actions-key.pem
        chmod 600 ~/.ssh/github-actions-key.pem
        ssh-keyscan -H ${{ secrets.EC2_HOST_DEV }} >> ~/.ssh/known_hosts 2>/dev/null || true
        ssh -i ~/.ssh/github-actions-key.pem \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST_DEV }} \
            "echo '✅ SSH connection successful - $(date)'"

    - name: Copy source code to DEV EC2
      run: |
        ssh -i ~/.ssh/github-actions-key.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST_DEV }} \
            "sudo mkdir -p /home/ubuntu/taskmanager && sudo chown -R ubuntu:ubuntu /home/ubuntu/taskmanager"
        
        scp -i ~/.ssh/github-actions-key.pem \
            -o StrictHostKeyChecking=no \
            -r . \
            ubuntu@${{ secrets.EC2_HOST_DEV }}:/home/ubuntu/taskmanager/
        
        echo "✅ Source code copied to DEV EC2"

    - name: Create .env.dev file on DEV EC2
      run: |
        ssh -T -i ~/.ssh/github-actions-key.pem ubuntu@${{ secrets.EC2_HOST_DEV }} << 'ENDSSH'
          set -e
          mkdir -p /home/ubuntu/taskmanager/env
          
          cat > /home/ubuntu/taskmanager/env/.env.dev << 'ENVEOF'
        FLASK_ENV=development
        FLASK_HOST=0.0.0.0
        FLASK_PORT=5000
        FLASK_DEBUG=true

        REDIS_HOST=redis
        REDIS_PORT=6379
        REDIS_URL=redis://redis:6379/0
        CACHE_REDIS_URL=redis://redis:6379/1
        CACHE_TYPE=RedisCache
        CACHE_DEFAULT_TIMEOUT=300

        SECRET_KEY=dev-secret-key-change-in-production
        JWT_SECRET_KEY=dev-jwt-secret-key-change-in-production
        JWT_ACCESS_TOKEN_EXPIRES=3600

        LOG_LEVEL=DEBUG
        LOG_TO_STDOUT=true

        RATELIMIT_ENABLED=false
        ENVEOF

          chmod 600 /home/ubuntu/taskmanager/env/.env.dev
          echo "✅ .env.dev created successfully"
        ENDSSH

    - name: Pull latest image and restart containers on DEV EC2
      env:
        IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
        AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
        AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        ECR_REPOSITORY: taskmanager-dev
        EC2_HOST: ${{ secrets.EC2_HOST_DEV }}
      run: |
        ssh -T -i ~/.ssh/github-actions-key.pem ubuntu@$EC2_HOST << ENDSSH
          set -e
          
          export AWS_ACCESS_KEY_ID="$AWS_ACCESS_KEY_ID"
          export AWS_SECRET_ACCESS_KEY="$AWS_SECRET_ACCESS_KEY"
          export AWS_REGION="$AWS_REGION"
          export ECR_REPOSITORY="$ECR_REPOSITORY"
          
          echo "🔍 Testing AWS credentials..."
          ACCOUNT_ID=\$(aws sts get-caller-identity --query Account --output text)
          echo "✅ AWS Account ID retrieved: \$ACCOUNT_ID"
          
          ECR_REGISTRY="\$ACCOUNT_ID.dkr.ecr.\$AWS_REGION.amazonaws.com"
          ECR_URI="\$ECR_REGISTRY/\$ECR_REPOSITORY"

          echo "🔐 Authenticating Docker with ECR..."
          aws ecr get-login-password --region \$AWS_REGION | \
            docker login --username AWS --password-stdin "\$ECR_REGISTRY"

          echo "📥 Pulling latest image..."
          docker pull "\$ECR_URI:latest"
          
          echo "📂 Navigating to /home/ubuntu/taskmanager"
          cd /home/ubuntu/taskmanager
          
          echo "🚀 Starting Docker containers..."
          docker compose -f docker-compose.dev.yml up -d --remove-orphans
          
          sleep 15
          docker ps
        ENDSSH

    - name: Verify DEV Deployment
      run: |
        ssh -i ~/.ssh/github-actions-key.pem ubuntu@${{ secrets.EC2_HOST_DEV }} << 'EOF'
          if docker ps | grep -q "taskmanager_app_dev"; then
            echo "✅ Flask dev container is running"
            docker logs taskmanager_app_dev --tail=20
            sleep 5
            if curl -f --max-time 10 http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ App is responding on port 5000 ✓"
            else
              echo "⚠️  App may not be responding yet"
            fi
          else
            echo "❌ Deployment failed"
            docker ps -a
            exit 1
          fi
        EOF

    - name: Notify DEV Deployment Success
      run: |
        echo "🎉 DEV DEPLOYMENT SUCCESSFUL!"
        echo "App:    http://${{ secrets.EC2_HOST_DEV }}:5000"
        echo "Health: http://${{ secrets.EC2_HOST_DEV }}:5000/health"