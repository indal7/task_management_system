name: CI – Lint & Test

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

# Restrict the GITHUB_TOKEN to the minimum required permissions.
permissions:
  contents: read

jobs:
  lint-and-test:
    name: Lint & Test
    runs-on: ubuntu-latest

    services:
      # Lightweight in-memory cache — tests use SimpleCache so Redis is not required
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements/dev.txt

      - name: Install Dependencies
        run: pip install -r requirements/dev.txt

      - name: Lint with flake8
        run: |
          flake8 app config

      - name: Run Tests
        env:
          FLASK_ENV: testing
          SECRET_KEY: ci-test-secret-key
          JWT_SECRET_KEY: ci-jwt-test-secret
        run: |
          export PYTHONPATH="${PYTHONPATH}:$(pwd)"
          pytest tests/ -v --tb=short --cov=app --cov-report=term-missing
