name: Deploy Flask to EC2

on:
  push:
    branches: [ master ]   # Trigger when pushing to master branch

jobs:
  # ── Build & Push Docker image to ECR ────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image to ECR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for OIDC (optional – uses access keys here)

    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Generate image tag
      id: image_tag
      run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

    - name: Build, tag, and push image to ECR
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'taskmanager-dev' }}
        IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
      run: |
        docker build -f docker/Dockerfile \
          -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
          -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
          .
        docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
        docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
        echo "✅ Pushed $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"

  # ── Deploy to EC2 ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy Flask App
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only run when the EC2 key secret is available.
    if: ${{ secrets.EC2_KEY != '' }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Add SSH Key and Wait for EC2
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/github-actions-key.pem
        chmod 600 ~/.ssh/github-actions-key.pem

        # Add to known hosts
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || echo "Adding to known hosts..."

        # Test SSH connection
        echo "🔍 Testing SSH connection..."
        ssh -i ~/.ssh/github-actions-key.pem \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST }} \
            "echo '✅ SSH connection successful - $(date)'"

    - name: Pull latest image and restart containers on EC2
      env:
        IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'taskmanager-dev' }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
      run: |
        ssh -i ~/.ssh/github-actions-key.pem ubuntu@${{ secrets.EC2_HOST }} << ENDSSH
          set -e

          # Authenticate Docker with ECR
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin \
            \$(aws ecr describe-repositories \
              --repository-names $ECR_REPOSITORY \
              --region $AWS_REGION \
              --query 'repositories[0].repositoryUri' \
              --output text | cut -d/ -f1)

          # Pull the new image
          ECR_URI=\$(aws ecr describe-repositories \
            --repository-names $ECR_REPOSITORY \
            --region $AWS_REGION \
            --query 'repositories[0].repositoryUri' \
            --output text)

          docker pull \$ECR_URI:latest

          # Restart with Docker Compose
          if [ -f /home/ubuntu/taskmanager/docker-compose.prod.yml ]; then
            docker compose -f /home/ubuntu/taskmanager/docker-compose.prod.yml \
              up -d --remove-orphans
          else
            docker stop taskmanager_app 2>/dev/null || true
            docker rm   taskmanager_app 2>/dev/null || true
            docker run -d \
              --name taskmanager_app \
              --restart unless-stopped \
              --env-file /home/ubuntu/taskmanager/env/.env.prod \
              -p 5000:5000 \
              \$ECR_URI:latest
          fi

          sleep 10
          docker ps
        ENDSSH

    - name: Verify Deployment
      run: |
        ssh -i ~/.ssh/github-actions-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          if sudo docker ps | grep -q "taskmanager_app"; then
            echo "✅ Flask container is running"
            echo "📋 App logs (last 20 lines):"
            docker logs taskmanager_app --tail=20
            sleep 5
            if curl -f --max-time 10 http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ App is responding on port 5000"
            else
              echo "⚠️  App may not be responding yet – check logs above"
            fi
          else
            echo "❌ Deployment failed – container not running"
            docker ps -a
            docker logs taskmanager_app --tail=50 || true
            exit 1
          fi
        EOF

    - name: Notify Deployment Success
      run: |
        echo "🚀 Deployment successful!"
        echo "App: http://${{ secrets.EC2_HOST }}:5000"
        echo "Health: http://${{ secrets.EC2_HOST }}:5000/health"
        echo "Image tag: ${{ needs.build-and-push.outputs.image_tag }}"