# ==============================================================================
# DEPRECATED – this workflow has been superseded by separate dev/prod pipelines.
#
#   dev-deploy.yml  – auto-deploys on every push to the `develop` branch
#   prod-deploy.yml – deploys on push to `master` with a mandatory approval gate
#
# This file is kept for reference only and will not trigger on any branch.
# ==============================================================================
name: Deploy Flask to EC2 (deprecated)

on:
  push:
    branches: [ __disabled__ ]   # disabled – use dev-deploy.yml or prod-deploy.yml

jobs:
  # ── Build & Push Docker image to ECR ────────────────────────────────────────
  build-and-push:
    name: Build & Push Docker image to ECR
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # needed for OIDC (optional – uses access keys here)

    outputs:
      image_tag: ${{ steps.image_tag.outputs.tag }}
      ecr_uri: ${{ steps.ecr_uri.outputs.uri }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ secrets.AWS_REGION || 'ap-south-1' }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Generate image tag
      id: image_tag
      run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

    - name: Resolve ECR URI
      id: ecr_uri
      env:
        ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'taskmanager-dev' }}
      run: echo "uri=$ECR_REGISTRY/$ECR_REPOSITORY" >> "$GITHUB_OUTPUT"

    - name: Build, tag, and push image to ECR
      env:
        ECR_URI: ${{ steps.ecr_uri.outputs.uri }}
        IMAGE_TAG: ${{ steps.image_tag.outputs.tag }}
      run: |
        docker build -f docker/Dockerfile \
          -t "$ECR_URI:$IMAGE_TAG" \
          -t "$ECR_URI:latest" \
          .
        docker push "$ECR_URI:$IMAGE_TAG"
        docker push "$ECR_URI:latest"
        echo "✅ Pushed $ECR_URI:$IMAGE_TAG"

  # ── Deploy to EC2 ──────────────────────────────────────────────────────────
  deploy:
    name: Deploy Flask App
    runs-on: ubuntu-latest
    needs: build-and-push
    # Only run when the EC2 key secret is available.
    if: ${{ github.ref == 'refs/heads/master' }}

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Add SSH Key and Wait for EC2
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.EC2_KEY }}" > ~/.ssh/github-actions-key.pem
        chmod 600 ~/.ssh/github-actions-key.pem

        # Add to known hosts
        ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts 2>/dev/null || echo "Adding to known hosts..."

        # Test SSH connection
        echo "🔍 Testing SSH connection..."
        ssh -i ~/.ssh/github-actions-key.pem \
            -o ConnectTimeout=30 \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST }} \
            "echo '✅ SSH connection successful - $(date)'"

    - name: Copy prod docker-compose file to EC2
      run: |
        # Ensure target directory exists and is writable before copying
        ssh -i ~/.ssh/github-actions-key.pem \
            -o StrictHostKeyChecking=no \
            ubuntu@${{ secrets.EC2_HOST }} \
            "sudo mkdir -p /home/ubuntu/taskmanager && sudo chown -R ubuntu:ubuntu /home/ubuntu/taskmanager"
        scp -i ~/.ssh/github-actions-key.pem \
            -o StrictHostKeyChecking=no \
            docker/docker-compose.prod.yml \
            ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/taskmanager/docker-compose.prod.yml
        echo "✅ docker-compose.prod.yml copied to EC2"

    - name: Pull latest image and restart containers on EC2
      env:
        IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        AWS_REGION: ${{ secrets.AWS_REGION || 'ap-south-1' }}
        ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY || 'taskmanager-dev' }}
        EC2_HOST: ${{ secrets.EC2_HOST }}
      run: |
        ssh -T -i ~/.ssh/github-actions-key.pem ubuntu@${{ secrets.EC2_HOST }} << ENDSSH
          set -e

          # Derive ECR URI on the EC2 host using its IAM role.
          # This avoids passing the ECR URI as a job output, which GitHub Actions
          # would suppress because the AWS account ID is treated as a secret.
          ACCOUNT_ID=\$(aws sts get-caller-identity --query Account --output text)
          if [ -z "\$ACCOUNT_ID" ]; then
            echo "❌ Failed to retrieve AWS Account ID from EC2 IAM role"
            exit 1
          fi
          ECR_REGISTRY="\$ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com"
          ECR_URI="\$ECR_REGISTRY/$ECR_REPOSITORY"

          # Authenticate Docker with ECR
          aws ecr get-login-password --region $AWS_REGION | \
            docker login --username AWS --password-stdin "\$ECR_REGISTRY"

          # Pull the new image
          docker pull "\$ECR_URI:latest"

          # Ensure the taskmanager directory exists
          mkdir -p /home/ubuntu/taskmanager/env

          # Bring up the stack using the prod compose file
          # ECR_IMAGE is exported so docker-compose.prod.yml can reference it
          export ECR_IMAGE="\$ECR_URI"
          docker compose -f /home/ubuntu/taskmanager/docker-compose.prod.yml \
            up -d --remove-orphans

          sleep 15
          docker ps
        ENDSSH

    - name: Verify Deployment
      run: |
        ssh -i ~/.ssh/github-actions-key.pem ubuntu@${{ secrets.EC2_HOST }} << 'EOF'
          if docker ps | grep -q "taskmanager_app"; then
            echo "✅ Flask container is running"
            echo "📋 App logs (last 20 lines):"
            docker logs taskmanager_app --tail=20
            sleep 5
            if curl -f --max-time 10 http://localhost:5000/health > /dev/null 2>&1; then
              echo "✅ App is responding on port 5000"
            else
              echo "⚠️  App may not be responding yet – check logs above"
            fi
          else
            echo "❌ Deployment failed – container not running"
            docker ps -a
            docker logs taskmanager_app --tail=50 || true
            exit 1
          fi
        EOF

    - name: Notify Deployment Success
      run: |
        echo "🚀 Deployment successful!"
        echo "App: http://${{ secrets.EC2_HOST }}:5000"
        echo "Health: http://${{ secrets.EC2_HOST }}:5000/health"
        echo "Image tag: ${{ needs.build-and-push.outputs.image_tag }}"